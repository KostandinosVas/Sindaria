<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark circular background -->
  <circle cx="32" cy="32" r="32" fill="#2c2929"/>

  <!-- Thin decorative ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#e2b65d" stroke-width="1.2" opacity="0.5"/>

  <!-- S glyph using a path for a serif/elegant look -->
  <text
    x="32"
    y="45"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="#e2b65d"
    letter-spacing="0"
  >S</text>

  <!-- Top and bottom ornamental dots -->
  <circle cx="32" cy="7"  r="2" fill="#e2b65d" opacity="0.6"/>
  <circle cx="32" cy="57" r="2" fill="#e2b65d" opacity="0.6"/>
</svg>
